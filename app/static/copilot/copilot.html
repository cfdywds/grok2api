<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Copilot 图片助手</title>
  <link rel="icon" href="/static/favicon/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/common.css?v=3" rel="stylesheet">
  <link href="/static/common/toast.css" rel="stylesheet">
  <link href="/static/common/dialog.css" rel="stylesheet">
  <link href="/static/copilot/copilot.css?v=1" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 flex flex-col" style="margin-top: 56px; height: calc(100vh - 56px);">
    <!-- Title bar -->
    <div class="border-b border-[var(--border)] px-6 py-3 flex items-center justify-between shrink-0">
      <div>
        <h2 class="text-lg font-semibold tracking-tight">Copilot 图片助手</h2>
        <p class="text-[var(--accents-4)] text-xs">通过自然语言对话生成图片，由 LM Studio 本地模型驱动</p>
      </div>
      <button id="toggleSidebar" class="copilot-icon-btn" title="会话列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
      </button>
    </div>

    <!-- Main content: sidebar + chat -->
    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar: session list -->
      <aside id="sidebar" class="copilot-sidebar">
        <div class="p-3 border-b border-[var(--border)]">
          <button id="newSessionBtn" class="copilot-new-session-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            新建对话
          </button>
        </div>
        <div id="sessionList" class="copilot-session-list"></div>
      </aside>

      <!-- Chat area -->
      <div class="flex-1 flex flex-col min-w-0">
        <!-- Messages -->
        <div id="messagesArea" class="copilot-messages-area">
          <div id="welcomeScreen" class="copilot-welcome">
            <div class="copilot-welcome-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </div>
            <h3 class="text-lg font-medium mt-4">Copilot 图片助手</h3>
            <p class="text-sm text-[var(--accents-4)] mt-2 max-w-md text-center">
              告诉我你想要什么图片，我会将你的描述转化为专业提示词并生成图片。<br>
              你也可以和我自由聊天。
            </p>
            <div class="copilot-welcome-examples">
              <button class="copilot-example-btn" data-prompt="画一只在月光下弹钢琴的猫">画一只在月光下弹钢琴的猫</button>
              <button class="copilot-example-btn" data-prompt="赛博朋克风格的东京街头，霓虹灯雨夜">赛博朋克东京街头</button>
              <button class="copilot-example-btn" data-prompt="水彩风格的山间日出，薄雾缭绕">水彩山间日出</button>
            </div>
          </div>
          <div id="messagesList" class="copilot-messages-list" style="display:none;"></div>
        </div>

        <!-- Input area -->
        <div class="copilot-input-area">
          <div class="copilot-input-wrapper">
            <textarea id="messageInput" class="copilot-input" placeholder="描述你想要的图片，或和我聊天..."
              rows="1"></textarea>
            <button id="sendBtn" class="copilot-send-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <p class="text-[10px] text-[var(--accents-4)] mt-1.5 text-center">
            Enter 发送 · Shift+Enter 换行 · 对话由 LM Studio 本地模型驱动，图片由 Grok 生成
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/common/admin-auth.js?v=3"></script>
  <script src="/static/common/header.js?v=4"></script>
  <script src="/static/common/toast.js"></script>
  <script src="/static/common/dialog.js"></script>
  <script src="/static/copilot/copilot.js?v=1"></script>
</body>

</html>
