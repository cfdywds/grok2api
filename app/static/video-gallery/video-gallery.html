<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频管理 - Grok2API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/common/common.css">
    <link rel="stylesheet" href="/static/common/dialog.css">
    <link rel="stylesheet" href="/static/video-gallery/video-gallery.css">
</head>
<body>
    <div id="app">
        <div id="toast-container" class="toast-container"></div>
        <div id="header-container"></div>

        <div class="container">
            <!-- 统计卡片 -->
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon">🎬</div>
                    <div class="stat-content">
                        <div class="stat-label">视频总数</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💾</div>
                    <div class="stat-content">
                        <div class="stat-label">总大小</div>
                        <div class="stat-value" id="stat-size">0 MB</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-content">
                        <div class="stat-label">本月新增</div>
                        <div class="stat-value" id="stat-month">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏷️</div>
                    <div class="stat-content">
                        <div class="stat-label">常用标签</div>
                        <div class="stat-value" id="stat-tags">-</div>
                    </div>
                </div>
            </div>

            <!-- 筛选工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" id="search-input" class="search-input" placeholder="搜索提示词...">
                    <select id="resolution-filter" class="filter-select">
                        <option value="">所有分辨率</option>
                        <option value="480p">480p</option>
                        <option value="720p">720p</option>
                    </select>
                    <select id="ratio-filter" class="filter-select">
                        <option value="">所有比例</option>
                        <option value="1:1">1:1</option>
                        <option value="3:2">3:2</option>
                        <option value="2:3">2:3</option>
                        <option value="16:9">16:9</option>
                        <option value="9:16">9:16</option>
                    </select>
                    <select id="length-filter" class="filter-select">
                        <option value="">所有时长</option>
                        <option value="6">6 秒</option>
                        <option value="10">10 秒</option>
                        <option value="15">15 秒</option>
                    </select>
                    <select id="sort-filter" class="filter-select">
                        <option value="created_at:desc">最新优先</option>
                        <option value="created_at:asc">最早优先</option>
                        <option value="file_size:desc">大小降序</option>
                        <option value="file_size:asc">大小升序</option>
                    </select>
                    <select id="favorite-filter" class="filter-select">
                        <option value="">所有视频</option>
                        <option value="true">仅收藏</option>
                        <option value="false">未收藏</option>
                    </select>
                    <button id="filter-btn" class="btn btn-primary">筛选</button>
                    <button id="reset-btn" class="btn btn-secondary">重置</button>
                </div>
                <div class="toolbar-right">
                    <button id="scan-btn" class="btn btn-primary" title="扫描本地视频文件夹">
                        <span>🔄</span> 同步本地
                    </button>
                    <button id="check-missing-btn" class="btn btn-warning" title="检查失效视频">
                        <span>🔍</span> 检查失效
                    </button>
                    <button id="select-all" class="btn btn-secondary">全选</button>
                    <button id="delete-btn" class="btn btn-danger" disabled>删除</button>
                </div>
            </div>

            <!-- 顶部分页 -->
            <div class="pagination pagination-top" id="pagination-top" style="display: none;">
                <button id="prev-page-top" class="btn btn-secondary btn-page" disabled>←</button>
                <div id="page-numbers-top" class="page-numbers"></div>
                <button id="next-page-top" class="btn btn-secondary btn-page" disabled>→</button>
            </div>

            <!-- 视频容器 -->
            <div id="videos-container" class="videos-grid"></div>

            <!-- 加载状态 -->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <div class="empty-icon">🎬</div>
                <p>暂无视频</p>
                <p class="empty-hint">点击「同步本地」扫描视频文件</p>
            </div>

            <!-- 底部分页 -->
            <div class="pagination" id="pagination" style="display: none;">
                <button id="prev-page" class="btn btn-secondary btn-page" disabled>←</button>
                <div id="page-numbers" class="page-numbers"></div>
                <button id="next-page" class="btn btn-secondary btn-page" disabled>→</button>
                <div class="page-jump">
                    <span class="page-jump-label">第</span>
                    <input type="number" id="page-jump-input" class="page-jump-input" min="1" value="1">
                    <span class="page-jump-label" id="page-total-label">/ 1 页</span>
                    <button id="page-jump-btn" class="btn btn-primary btn-sm">跳转</button>
                </div>
            </div>
        </div>

        <!-- 视频详情弹窗 -->
        <div id="detail-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="modal-close" id="close-detail-modal">&times;</span>
                <div class="modal-body">
                    <div class="modal-video">
                        <video id="detail-video" controls preload="metadata"></video>
                    </div>
                    <div class="modal-info">
                        <h3>视频详情</h3>
                        <div class="info-group">
                            <label>提示词：</label>
                            <p id="detail-prompt"></p>
                        </div>
                        <div class="info-group">
                            <label>模型：</label>
                            <p id="detail-model"></p>
                        </div>
                        <div class="info-group">
                            <label>宽高比：</label>
                            <p id="detail-ratio"></p>
                        </div>
                        <div class="info-group">
                            <label>时长：</label>
                            <p id="detail-length"></p>
                        </div>
                        <div class="info-group">
                            <label>分辨率：</label>
                            <p id="detail-resolution"></p>
                        </div>
                        <div class="info-group">
                            <label>文件大小：</label>
                            <p id="detail-filesize"></p>
                        </div>
                        <div class="info-group">
                            <label>创建时间：</label>
                            <p id="detail-time"></p>
                        </div>
                        <div class="info-group">
                            <label>标签：</label>
                            <div id="detail-tags" class="tags-container"></div>
                        </div>
                        <div class="info-group">
                            <label>添加标签：</label>
                            <div class="tag-input-group">
                                <input type="text" id="tag-input" placeholder="输入标签，按回车添加">
                                <button id="add-tag-btn" class="btn btn-primary btn-sm">添加</button>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button id="favorite-detail-btn" class="btn btn-secondary">❤️ 收藏</button>
                            <button id="delete-single-btn" class="btn btn-danger">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 失效检查弹窗 -->
        <div id="missing-files-modal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 800px;">
                <span class="modal-close" id="close-missing-modal">&times;</span>
                <div class="modal-body">
                    <h3>失效视频检查结果</h3>
                    <div id="missing-summary" class="info-group"><p>正在检查...</p></div>
                    <div id="missing-list-container" style="display: none;">
                        <div class="info-group">
                            <label>失效视频列表：</label>
                            <div style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; padding: 10px;">
                                <table style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr style="background: #f5f5f5;">
                                            <th style="padding: 8px; text-align: left;">文件名</th>
                                            <th style="padding: 8px; text-align: left;">提示词</th>
                                        </tr>
                                    </thead>
                                    <tbody id="missing-files-list"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button id="cleanup-missing-btn" class="btn btn-danger">清理所有失效数据</button>
                            <button id="close-missing-btn" class="btn btn-secondary">关闭</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/common/dialog.js"></script>
    <script src="/static/video-gallery/video-gallery.js"></script>
    <script src="/static/common/admin-auth.js?v=3"></script>
    <script src="/static/common/header.js?v=6"></script>
</body>
</html>
